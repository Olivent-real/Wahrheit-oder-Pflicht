<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahrheit oder Pflicht</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }
        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #ff6b81;
        }
        .hidden {
            display: none;
        }
        #ausgabe {
            margin-top: 20px;
            font-size: 18px;
            min-height: 60px;
        }
    </style>
</head>
<body>

    <div id="login-container" class="container">
        <h2>Wahrheit oder Pflicht 🔥</h2>
        <input type="text" id="benutzername" placeholder="Benutzername"><br>
        <input type="password" id="passwort" placeholder="Passwort"><br>
        <button onclick="starteSpiel()">Registrieren</button>
        <button onclick="starteSpiel()">Einloggen</button>
    </div>

    <div id="game-container" class="container hidden">
        <h1 id="welcome-user">Wahrheit oder Pflicht</h1>
        <p>Wählt eine Kategorie:</p>
        <button onclick="zeigeWahrheit()">Wahrheit</button>
        <button onclick="zeigePflicht()">Pflicht</button>
        
        <div id="ausgabe">Drückt einen Button, um zu starten!</div>
    </div>

    <script>
        const wahrheiten = [
            "Was war das Peinlichste, das dir je passiert ist?",
            "Welches Geheimnis hast du deinen Eltern verschwiegen?",
            "In wen warst du das allererste Mal verknallt?"
        ];

        const pflichten = [
            "Schreibe einer Person deiner Wahl das letzte Emoji, das du benutzt hast.",
            "Mache 10 Kniebeugen, während du lachst.",
            "Lass dir von deiner Mitspielerin eine neue Frisur verpassen."
        ];

        function starteSpiel() {
            const name = document.getElementById("benutzername").value;
            if (name.trim() === "") {
                alert("Bitte gib einen Benutzernamen ein!");
                return;
            }
            // Login-Bereich verstecken, Spiel anzeigen
            document.getElementById("login-container").classList.add("hidden");
            document.getElementById("game-container").classList.remove("hidden");
            document.getElementById("welcome-user").innerText = "Hey " + name + "! 🔥";
        }

        function zeigeWahrheit() {
            const zufall = Math.floor(Math.random() * wahrheiten.length);
            document.getElementById("ausgabe").innerText = "Wahrheit: " + wahrheiten[zufall];
        }

        function zeigePflicht() {
            const zufall = Math.floor(Math.random() * pflichten.length);
            document.getElementById("ausgabe").innerText = "Pflicht: " + pflichten[zufall];
        }
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDMWbxdRx3oimxSR4JZcujCSuU_9T7WUrE",
        authDomain: "wahrheit-oder-pflicht-209af.firebaseapp.com",
        projectId: "wahrheit-oder-pflicht-209af",
        storageBucket: "wahrheit-oder-pflicht-209af.firebasestorage.app",
        messagingSenderId: "661628470042",
        appId: "1:661628470042:web:06cb304c1f924b4b4362a3",
        measurementId: "G-QJWXS2S19K"
      };

      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
    </script>
</body>
</html>
