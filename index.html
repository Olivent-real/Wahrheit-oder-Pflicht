<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wahrheit oder Pflicht Online</title>
    <!-- Tailwind CSS für modernes Design -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <!-- Container -->
    <div id="app" class="container mx-auto p-4 max-w-md flex-grow flex flex-col justify-center">
        
        <!-- 1. AUTH-ANSICHT (Login / Registrierung) -->
        <div id="auth-screen" class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <h1 class="text-2xl font-bold text-center mb-6 text-purple-400">Wahrheit oder Pflicht 🔥</h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Benutzername</label>
                    <input type="text" id="username" class="w-full px-4 py-2 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Passwort</label>
                    <input type="password" id="password" class="w-full px-4 py-2 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:border-purple-500">
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="register()" class="w-1/2 bg-slate-700 hover:bg-slate-600 font-semibold py-2 rounded-lg transition">Registrieren</button>
                    <button onclick="login()" class="w-1/2 bg-purple-600 hover:bg-purple-500 font-semibold py-2 rounded-lg transition">Einloggen</button>
                </div>
                <p id="auth-error" class="text-red-400 text-sm text-center mt-2 hidden"></p>
            </div>
        </div>

        <!-- 2. SPIEL- & CHAT-ANSICHT (Nach Login) -->
        <div id="game-screen" class="hidden flex-grow flex flex-col justify-between bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden my-4">
            <!-- Header -->
            <div class="bg-slate-900 p-4 border-b border-slate-700 flex justify-between items-center">
                <span class="font-bold text-purple-400" id="current-user-display">Eingeloggt</span>
                <button onclick="logout()" class="text-xs bg-red-600 hover:bg-red-500 px-3 py-1 rounded-md transition">Abmelden</button>
            </div>

            <!-- Spiel-Bereich / Feed -->
            <div class="p-4 flex-grow overflow-y-auto space-y-4" id="feed">
                <div class="text-center text-slate-500 text-sm py-4">Wähle eine Kategorie oder starte das Spiel!</div>
            </div>

            <!-- Aktions-Bedienfeld -->
            <div class="p-4 bg-slate-900 border-t border-slate-700">
                <div class="flex gap-2 mb-3">
                    <button onclick="chooseOption('Wahrheit')" class="w-1/2 bg-blue-600 hover:bg-blue-500 font-bold py-2 rounded-lg transition">Wahrheit 🔵</button>
                    <button onclick="chooseOption('Pflicht')" class="w-1/2 bg-pink-600 hover:bg-pink-500 font-bold py-2 rounded-lg transition">Pflicht 🔴</button>
                </div>

                <!-- Eingabe / Upload -->
                <div id="action-input-box" class="hidden space-y-2">
                    <p id="selected-choice-text" class="text-sm font-semibold text-purple-300"></p>
                    <input type="text" id="task-text" placeholder="Deine Antwort oder Aufgabe eingeben..." class="w-full px-3 py-2 text-sm rounded-lg bg-slate-800 border border-slate-700 focus:outline-none">
                    
                    <div class="flex justify-between items-center">
                        <label class="cursor-pointer text-xs bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-lg transition flex items-center gap-1">
                            📷 Foto/Video hochladen
                            <input type="file" id="media-file" accept="image/*,video/*" class="hidden" onchange="previewMedia(this)">
                        </label>
                        <button onclick="submitTurn()" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 text-sm font-bold rounded-lg transition">Absenden</button>
                    </div>
                    <div id="media-preview" class="text-xs text-green-400 hidden">Datei ausgewählt!</div>
                </div>
            </div>
        </div>

    </div>

    <!-- JavaScript Logik -->
    <script>
        let currentUser = null;
        let selectedType = '';
        let uploadedFileUrl = '';

        // Hilfsfunktion: Benutzer aus dem lokalen Speicher laden
        function getUsers() {
            return JSON.parse(localStorage.getItem('wod_users')) || {};
        }

        function register() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const errorEl = document.getElementById('auth-error');

            if (!user || !pass) {
                showError('Bitte Benutzername und Passwort eingeben.');
                return;
            }

            let users = getUsers();
            if (users[user]) {
                showError('Benutzername bereits vergeben.');
                return;
            }

            users[user] = pass;
            localStorage.setItem('wod_users', JSON.stringify(users));
            alert('Erfolgreich registriert! Du kannst dich jetzt einloggen.');
        }

        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            let users = getUsers();
            if (users[user] && users[user] === pass) {
                currentUser = user;
                document.getElementById('current-user-display').innerText = `Eingeloggt als: ${user}`;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                loadFeed();
            } else {
                showError('Falscher Benutzername oder Passwort.');
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function showError(text) {
            const err = document.getElementById('auth-error');
            err.innerText = text;
            err.classList.remove('hidden');
        }

        function chooseOption(type) {
            selectedType = type;
            document.getElementById('selected-choice-text').innerText = `Du hast ${type} gewählt!`;
            document.getElementById('action-input-box').classList.remove('hidden');
        }

        function previewMedia(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedFileUrl = e.target.result;
                    document.getElementById('media-preview').classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function submitTurn() {
            const text = document.getElementById('task-text').value;
            if (!text && !uploadedFileUrl) {
                alert('Bitte schreibe etwas oder lade ein Medium hoch!');
                return;
            }

            let posts = JSON.parse(localStorage.getItem('wod_posts')) || [];
            posts.unshift({
                user: currentUser,
                type: selectedType,
                text: text,
                media: uploadedFileUrl,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });

            localStorage.setItem('wod_posts', JSON.stringify(posts));

            // Reset
            document.getElementById('task-text').value = '';
            document.getElementById('media-file').value = '';
            document.getElementById('media-preview').classList.add('hidden');
            document.getElementById('action-input-box').classList.add('hidden');
            uploadedFileUrl = '';

            loadFeed();
        }

        function loadFeed() {
            const feed = document.getElementById('feed');
            let posts = JSON.parse(localStorage.getItem('wod_posts')) || [];

            if (posts.length === 0) {
                feed.innerHTML = '<div class="text-center text-slate-500 text-sm py-4">Noch keine Einträge. Wähle Wahrheit oder Pflicht!</div>';
                return;
            }

            feed.innerHTML = posts.map(p => `
                <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 space-y-2">
                    <div class="flex justify-between items-center text-xs text-slate-400">
                        <span class="font-bold text-purple-400">${p.user}</span>
                        <span class="bg-${p.type === 'Wahrheit' ? 'blue' : 'pink'}-900 text-${p.type === 'Wahrheit' ? 'blue' : 'pink'}-200 px-2 py-0.5 rounded">${p.type}</span>
                    </div>
                    ${p.text ? `<p class="text-sm text-slate-200">${p.text}</p>` : ''}
                    ${p.media ? `<div class="mt-2">${p.media.startsWith('data:video') ? `<video src="${p.media}" controls class="rounded-lg max-h-48 w-full object-cover">` : `<img src="${p.media}" class="rounded-lg max
